<!DOCTYPE html>
<html>
<head>
    <title>C.O.D.E.X. Comms</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background-color: #0f0f0f; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #transmit-btn {
            width: 220px; height: 220px;
            border-radius: 50%;
            border: 4px solid #00ff41;
            background: rgba(0, 255, 65, 0.1);
            color: #00ff41; font-size: 20px; font-weight: bold;
            cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        #transmit-btn:active, #transmit-btn.recording { background: rgba(0, 255, 65, 0.4); box-shadow: 0 0 40px rgba(0, 255, 65, 0.6); transform: scale(0.95); border-color: #fff; color: #fff; }
        #status { margin-top: 30px; font-size: 16px; text-transform: uppercase; letter-spacing: 2px; }
        #log { margin-top: 20px; width: 90%; max-width: 600px; height: 30vh; overflow-y: auto; border-top: 1px solid #333; padding-top: 10px; font-size: 14px; line-height: 1.4; }
        .user-msg { color: #888; margin-bottom: 5px; }
        .sys-msg { color: #00ff41; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="transmit-btn">HOLD TO TALK</div>
    <div id="status">CHANNEL OPEN</div>
    <div id="log"></div>

    <script>
        const btn = document.getElementById('transmit-btn');
        const status = document.getElementById('status');
        const log = document.getElementById('log');
        let mediaRecorder;
        let audioChunks = [];

        // 1. Setup Mic
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = sendAudio;
        }).catch(err => status.innerText = "MIC ERROR");

        // 2. Button Logic
        const startRec = (e) => { e.preventDefault(); if(mediaRecorder.state === 'inactive') { audioChunks=[]; mediaRecorder.start(); btn.classList.add('recording'); status.innerText = "TRANSMITTING..."; btn.innerText = "LISTENING"; } };
        const stopRec = (e) => { e.preventDefault(); if(mediaRecorder.state === 'recording') { mediaRecorder.stop(); btn.classList.remove('recording'); status.innerText = "PROCESSING..."; btn.innerText = "HOLD TO TALK"; } };

        btn.addEventListener('mousedown', startRec);
        btn.addEventListener('mouseup', stopRec);
        btn.addEventListener('touchstart', startRec);
        btn.addEventListener('touchend', stopRec);

        // 3. Send Audio -> Get Text -> Send to Mouth -> Play Audio
        async function sendAudio() {
            const blob = new Blob(audioChunks, { type: 'audio/wav' });
            const formData = new FormData();
            formData.append("file", blob, "input.wav");

            try {
                // Step A: Transcribe (Ears)
                const res = await fetch('/transcribe', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.text) {
                    addLog("> " + data.text, 'user-msg');

                    // Step B: Route through Mimir (Butler) + Codex (Ollama)
                    const ttsRes = await fetch('/relay_speech', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: data.text })
                    });

                    if (ttsRes.ok) {
                        const contentType = ttsRes.headers.get('content-type') || '';
                        const source = (ttsRes.headers.get('X-Voice-Source') || 'codex').toUpperCase();

                        if (contentType.includes('audio/wav')) {
                            const voiceText = ttsRes.headers.get('X-Voice-Text') || '...';
                            addLog(source + ": " + voiceText, 'sys-msg');
                            const audioBlob = await ttsRes.blob();
                            const audioUrl = URL.createObjectURL(audioBlob);
                            new Audio(audioUrl).play();
                            status.innerText = "RECEIVING...";
                        } else {
                            const fallback = await ttsRes.json();
                            addLog(source + ": " + fallback.text, 'sys-msg');
                            status.innerText = "TEXT ONLY";
                        }
                        setTimeout(() => status.innerText = "CHANNEL OPEN", 3000);
                    }
                }
            } catch (err) {
                console.error(err);
                status.innerText = "LINK FAILED";
            }
        }

        function addLog(msg, cls) {
            const div = document.createElement('div');
            div.className = cls;
            div.innerText = msg;
            log.prepend(div);
        }
    </script>
</body>
</html>
